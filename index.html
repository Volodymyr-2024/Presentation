<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Presentation</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

.slide {
  display: none;
  width: 100vw;
  height: 100vh;
  position: relative;
}

.slide.active {
  display: block;
}

button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 10px 20px;
  font-size: 18px;
  z-index: 10;
}

img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- СЛАЙД 1 -->
<div class="slide active">
  <img src="Auftragsabwicklung001.png">
</div>

<!-- СЛАЙД 2 -->
<div class="slide">
  <h1 style="text-align:center;padding-top:40vh;">
    Слайд 2
  </h1>
</div>

<!-- СЛАЙД 3 -->
<div class="slide">
  <h1 style="text-align:center;padding-top:40vh;">
    Слайд 3
  </h1>
</div>

<button onclick="next()">Next →</button>

<script>
let i = 0;
const slides = document.querySelectorAll(".slide");

function next() {
  slides[i].classList.remove("active");
  i = (i + 1) % slides.length;
  slides[i].classList.add("active");
}
</script>

</body>
</html>
